<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI×マーケ実務能力・個別診断 | カズ | AI副業エージェント研究所</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effect"></div>
    <div class="container">
        <header class="header">
            <h1 class="glow-text">AI×マーケ実務能力<br><span class="accent">個別診断シート</span></h1>
            <p class="subtitle">あなたのファネルの「致命傷」を診断し、完全自動化への最短ルートを提示します。</p>
            <div class="limit-badge">毎月 先着3名様限定</div>
        </header>

        <main class="glass-panel">
            <form action="https://formsubmit.co/6e6538b5bb842f839c87d0a4e16697ea" method="POST" class="diagnostic-form">
                <!-- FormSubmit Settings -->
                <input type="hidden" name="_subject" value="【新規申込】AI×マーケ実務能力診断">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_template" value="table">
                
                <div class="form-group">
                    <label for="x_account">1. Xアカウント名（@から始まるID） <span class="required">必須</span></label>
                    <input type="text" id="x_account" name="Xアカウント名" placeholder="@JobWakuwaku" required>
                </div>

                <div class="form-group">
                    <label for="genre">2. 発信しているジャンル・領域 <span class="required">必須</span></label>
                    <input type="text" id="genre" name="発信ジャンル" placeholder="例：AI副業、デザイン、プログラミング、キャリア支援など" required>
                </div>

                <div class="form-group">
                    <label for="income">3. 現在のSNS経由での月収 <span class="required">必須</span></label>
                    <input type="text" id="income" name="SNS月収" placeholder="例：0円、5万円、20万円など" required>
                </div>

                <div class="form-group">
                    <label for="ai_tools">4. 普段メインで使っているAIツール <span class="required">必須</span></label>
                    <input type="text" id="ai_tools" name="メインAIツール" placeholder="例：ChatGPT、Claude、Antigravity、あるいは使っていないなど" required>
                </div>

                <div class="form-group">
                    <label for="bottleneck">5. 今、自分が一番「ボトルネック（壁）」だと感じていること <span class="required">必須</span></label>
                    <textarea id="bottleneck" name="現在のボトルネック" rows="4" placeholder="例：フォロワーが増えない、商品は作れるが売り方が分からない、API代が高くて継続できないなど" required></textarea>
                </div>

                <div class="submit-container">
                    <button type="submit" class="submit-btn">診断を申し込む（無料）</button>
                    <p class="note">※送信後、カズより直接ご連絡いたします。</p>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
